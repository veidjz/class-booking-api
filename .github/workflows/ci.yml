name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ClassBooking.slnx

      - name: Build
        run: dotnet build ClassBooking.slnx -c Release --no-restore

      - name: Test
        run: dotnet test ClassBooking.slnx -c Release --no-build
